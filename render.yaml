services:
  - type: web
    name: inventory-api
    runtime: node
    region: frankfurt
    plan: free
    buildCommand: npm ci --include=dev && npx prisma generate && npm run build && npx prisma migrate deploy
    startCommand: NODE_ENV=production npm start
    healthCheckPath: /health
    autoDeployTrigger: commit
    envVars:
      - key: JWT_SECRET
        generateValue: true
      - key: JWT_EXPIRES_IN
        value: 1h
      - key: DATABASE_URL
        fromDatabase:
          name: inventory-api-db
          property: connectionString

databases:
  - name: inventory-api-db
    region: frankfurt
    plan: free
    databaseName: inventory_db
    postgresMajorVersion: "17"
