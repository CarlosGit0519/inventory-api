services:
  api:
    build:
      context: .
      target: production
    ports:
      - "3001:3001"
    environment:
      PORT: 3001
      DATABASE_URL: postgresql://inventory_user:inventory_password@postgres:5432/inventory_db?schema=public
      JWT_SECRET: ${JWT_SECRET:?Set JWT_SECRET in your local .env file}
      JWT_EXPIRES_IN: ${JWT_EXPIRES_IN:-1h}
    depends_on:
      migrate:
        condition: service_completed_successfully

  migrate:
    build:
      context: .
      target: build
    command: npx prisma migrate deploy
    environment:
      DATABASE_URL: postgresql://inventory_user:inventory_password@postgres:5432/inventory_db?schema=public
    depends_on:
      postgres:
        condition: service_healthy

  postgres:
    image: postgres:17-alpine
    environment:
      POSTGRES_DB: inventory_db
      POSTGRES_USER: inventory_user
      POSTGRES_PASSWORD: inventory_password
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U inventory_user -d inventory_db"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  postgres-data:
