name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  quality:
    name: Typecheck, build and test
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:17-alpine
        env:
          POSTGRES_DB: inventory_test
          POSTGRES_USER: inventory_user
          POSTGRES_PASSWORD: inventory_password
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U inventory_user -d inventory_test"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      DATABASE_URL: postgresql://inventory_user:inventory_password@localhost:5432/inventory_test?schema=public
      JWT_SECRET: ci-only-secret-not-for-production
      JWT_EXPIRES_IN: 1h
      PORT: 3001

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma client
        run: npx prisma generate

      - name: Apply database migrations
        run: npx prisma migrate deploy

      - name: Typecheck
        run: npm run typecheck

      - name: Build
        run: npm run build

      - name: Run tests
        run: npm test
